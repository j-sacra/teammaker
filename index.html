<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>⚽ Team Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;
  --text:#e6edf3;--muted:#9198a1;--green:#3fb950;--green-dim:#1a4428;
  --gold:#d29922;--red:#f85149;--blue:#58a6ff;--radius:10px
}
html{scroll-padding-top:110px}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:80px}
.container{max-width:540px;margin:0 auto}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.header-icon{font-size:24px}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;letter-spacing:0.5px}
.header-title span{color:var(--green)}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.share-btn{background:var(--green-dim);border:1px solid var(--green);color:var(--green);padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif}
.share-btn:active{opacity:0.7}

/* IDENTITY PILL */
.identity-pill{font-size:12px;color:var(--muted);background:rgba(255,255,255,.06);border:1px solid var(--border);padding:3px 10px;border-radius:20px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:500;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
.identity-pill:hover{background:rgba(255,255,255,.1)}
.identity-pill.not-signed-in{color:var(--green);border-color:var(--green)}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:49px;z-index:40;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs[role=tablist]{gap:0}
.tab{flex:1;padding:10px 4px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;font-family:'Barlow',sans-serif;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.3px;white-space:nowrap;min-width:0}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tab:focus-visible{outline:2px solid var(--green);outline-offset:-2px}

/* SECTIONS */
.section{display:none;padding:16px}
.section.active{display:block}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;overflow:hidden}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin-bottom:12px}

/* INPUTS */
input[type=text]{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 13px;border-radius:8px;font-size:15px;font-family:'Barlow',sans-serif;outline:none;width:100%}
input[type=text]:focus{border-color:var(--green)}
select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:14px;font-family:'Barlow',sans-serif;outline:none}

/* BUTTONS */
.btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:'Barlow',sans-serif;transition:opacity .15s}
.btn:active{opacity:.7}
.btn-green{background:var(--green);border-color:var(--green);color:#0d1117;font-weight:700}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn-red{color:var(--red);border-color:transparent;background:transparent}

/* ADD FORM */
.add-row{display:flex;gap:8px;margin-bottom:14px}
.add-row input{flex:1}

/* PLAYER ITEM */
.player-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
.player-item:last-child{margin-bottom:0}
.player-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;user-select:none}
.player-header:hover{background:rgba(255,255,255,.03)}
.player-header:focus-visible{outline:2px solid var(--green);outline-offset:-2px}
.player-name-text{flex:1;font-size:15px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-avg{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--gold);white-space:nowrap}
.mini-stars{color:var(--gold);font-size:13px;letter-spacing:-1px}
.mini-stars .empty{color:var(--border)}
.player-chev{color:var(--muted);font-size:11px;transition:transform .15s;margin-left:2px}
.player-item.open .player-chev{transform:rotate(180deg)}
.remove-btn{color:var(--muted);font-size:16px;background:none;border:none;cursor:pointer;padding:12px;min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
.remove-btn:active{color:var(--red)}
.remove-btn:focus-visible{outline:2px solid var(--green);outline-offset:-2px}

/* EXPANDABLE RATING PANEL */
.player-body{display:none;padding:4px 12px 12px;border-top:1px solid var(--border)}
.player-item.open .player-body{display:block}
.stars{display:flex;gap:0}
.star{font-size:20px;cursor:pointer;color:var(--border);line-height:1;transition:color .1s;padding:6px;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center;border:none;background:none;font-family:inherit}
.star.lit{color:var(--gold)}
.star:focus-visible{outline:2px solid var(--green);outline-offset:-2px;border-radius:4px}
.attr-grid{display:grid;grid-template-columns:minmax(80px,110px) 1fr;gap:8px 10px;margin-top:8px}
.attr-label{color:var(--muted);font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;align-self:center}

/* RATING SECTIONS */
.rating-count{font-size:12px;color:var(--muted);margin-top:2px;margin-bottom:6px}
.avg-val{font-size:13px;color:var(--gold);font-weight:600;font-family:'Barlow Condensed',sans-serif;min-width:28px;text-align:right}
.rating-section-title{font-size:12px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px;padding-top:10px;border-top:1px solid var(--border)}
.submit-rating-btn{width:100%;padding:10px;background:var(--green);color:#0d1117;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;cursor:pointer;margin-top:12px}
.submit-rating-btn:disabled{opacity:.4;cursor:not-allowed}
.submit-rating-btn:not(:disabled):active{opacity:.8}

/* ROOM BAR */
.roombar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px}
.roombar-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.roompill{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.06);border:1px solid var(--border);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.roommeta{color:var(--muted);font-size:13px}
.roombar-actions{margin-left:auto;display:flex;gap:6px}
.groups-panel{border-top:1px solid var(--border);margin-top:10px;padding-top:10px;display:none}
.groups-panel.open{display:block}
.group-list-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:14px;border:none;background:none;color:var(--text);width:100%;text-align:left;font-family:'Barlow',sans-serif}
.group-list-item:hover,.group-list-item:focus-visible{background:rgba(255,255,255,.04)}
.group-list-item:focus-visible{outline:2px solid var(--green);outline-offset:-2px}
.group-list-item.active{background:var(--green-dim);color:var(--green);font-weight:600}
.group-list-item .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.group-list-item.active .dot{background:var(--green)}
.group-list-item .del-group{margin-left:auto;color:var(--muted);background:none;border:none;cursor:pointer;font-size:14px;padding:8px;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center}
.group-list-item.active .del-group{display:none}
.new-group-row{display:flex;gap:6px;margin-top:8px}

/* SETUP */
.excl-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.excl-row:last-child{border-bottom:none}
.excl-vs{color:var(--muted);font-size:13px}

/* SORTEIO BTN */
.sorteio-btn{width:100%;padding:15px;background:var(--green);color:#0d1117;border:none;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:6px}
.sorteio-btn:active{opacity:.8}

/* PLAYER SELECTION */
.sel-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;user-select:none;font-size:14px}
.sel-item:hover{background:rgba(255,255,255,.03)}
.sel-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;transition:all .15s}
.sel-item.checked .sel-check{background:var(--green);border-color:var(--green);color:#0d1117}

/* ASSIGNMENT PILLS */
.assign-pills{display:flex;gap:2px;flex-shrink:0}
.assign-pill{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px;transition:all .15s}
.assign-pill.active{background:var(--green-dim);color:var(--green);border-color:var(--green)}
.assign-pill.active-b{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.4)}
.assign-pill.active-p{background:rgba(255,255,255,.05);color:var(--muted);border-color:var(--muted)}

/* RESULT COLUMNS */
.result-columns{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.result-col{padding:10px}
.result-col:first-child{border-right:1px solid var(--border)}
.result-col-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-align:center;padding:4px 0 8px;letter-spacing:.5px}
.result-col-avg{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.result-player{display:flex;align-items:center;gap:6px;padding:5px 2px}
.result-player-name{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-player-rating{font-size:12px;color:var(--gold);font-family:'Barlow Condensed',sans-serif}

/* REDO / SAVE */
.redo-btn{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;margin-top:4px}
.save-draw-btn{flex:1;padding:12px;background:var(--green-dim);border:1px solid var(--green);border-radius:var(--radius);color:var(--green);font-size:15px;font-weight:600;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.save-draw-btn:active{opacity:.7}
.save-draw-btn:disabled{opacity:.4;cursor:not-allowed}

/* HISTORY */
.hist-item{background:var(--surface2);border-radius:8px;margin-bottom:8px;border:1px solid var(--border);overflow:hidden}
.hist-header{display:flex;align-items:center;gap:10px;padding:12px;cursor:pointer;user-select:none}
.hist-header:hover{background:rgba(255,255,255,.03)}
.hist-date{font-size:13px;color:var(--muted)}
.hist-score-pill{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;margin-left:auto;letter-spacing:1px}
.hist-chev{color:var(--muted);font-size:11px;transition:transform .15s;margin-left:4px}
.hist-item.open .hist-chev{transform:rotate(180deg)}
.hist-body{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
.hist-item.open .hist-body{display:block}
.hist-empty{color:var(--muted);font-size:14px;text-align:center;padding:30px 0}

/* MATCH DETAIL */
.match-score{display:flex;justify-content:center;align-items:center;gap:16px;padding:14px 0 10px;font-family:'Barlow Condensed',sans-serif}
.match-score-team{display:flex;align-items:center;gap:8px}
.match-score-name{font-size:14px;font-weight:600;color:var(--muted);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match-score-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.match-score-num{font-size:32px;font-weight:700}
.match-score-vs{font-size:16px;color:var(--muted);font-weight:600}
.match-columns{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:4px}
.match-col{padding:0 4px}
.match-col:first-child{border-right:1px solid var(--border)}
.match-col-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center;padding:6px 0;margin-bottom:4px}
.match-player{padding:6px 2px;border-bottom:1px solid rgba(48,54,61,.5)}
.match-player:last-child{border-bottom:none}
.match-player-name{font-size:13px;font-weight:500;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match-player-stats{display:flex;gap:8px}
.stat-ctrl{display:flex;align-items:center;gap:2px}
.stat-label{font-weight:700;color:var(--muted);font-size:11px;min-width:12px;text-align:center}
.stat-val{font-weight:600;min-width:16px;text-align:center;font-size:13px;font-family:'Barlow Condensed',sans-serif}
.stat-btn{width:26px;height:26px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:'Barlow',sans-serif}
.stat-btn:active{background:var(--surface2)}

/* SHARE TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:#0d1117;padding:10px 20px;border-radius:8px;font-weight:700;font-size:14px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* EMPTY */
.empty{color:var(--muted);font-size:14px;text-align:center;padding:24px 0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700}
.modal-subtitle{font-size:13px;color:var(--muted);margin-bottom:16px}
.signin-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;border:none;background:none;color:var(--text);width:100%;text-align:left;font-family:'Barlow',sans-serif;font-size:15px;font-weight:500}
.signin-item:hover{background:var(--surface2)}
.signin-item:focus-visible{outline:2px solid var(--green);outline-offset:-2px}
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">⚽</span>
  <span class="header-title">TEAM<span>MAKER</span></span>
  <div class="header-right">
    <button class="identity-pill not-signed-in" id="identity-pill" onclick="showSignInModal()" style="display:none">Entrar</button>
    <button class="share-btn" onclick="shareState()">Partilhar</button>
  </div>
</div>

<div class="tabs" role="tablist" aria-label="Navegação principal">
  <button class="tab active" role="tab" aria-selected="true" aria-controls="tab-players" id="tab-btn-players" onclick="showTab('players',this)">Jogadores</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="tab-setup" id="tab-btn-setup" onclick="showTab('setup',this)">Equipas</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="tab-history" id="tab-btn-history" onclick="showTab('history',this)">Histórico</button>
</div>

<div class="container">

<!-- JOGADORES -->
<div id="tab-players" class="section active" role="tabpanel" aria-labelledby="tab-btn-players">
  <div class="roombar">
    <div class="roombar-top">
      <span style="color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase">Sala</span>
      <span class="roompill" id="room-pill">ligadoscoxos</span>
      <span class="roommeta" id="room-status">a ligar…</span>
      <div class="roombar-actions">
        <button class="btn btn-sm" onclick="copyRoomLink()">Copiar link</button>
        <button class="btn btn-sm" onclick="toggleGroupsPanel()">Grupos</button>
      </div>
    </div>
    <div class="groups-panel" id="groups-panel">
      <div id="group-list"></div>
      <div class="new-group-row">
        <input type="text" id="inp-new-group" placeholder="Nome do novo grupo..." style="flex:1;padding:7px 10px;font-size:13px" onkeydown="if(event.key==='Enter')createGroup()">
        <button class="btn btn-sm btn-green" onclick="createGroup()">+ Novo grupo</button>
      </div>
    </div>
  </div>
  <div class="add-row">
    <input type="text" id="inp-player" placeholder="Nome do jogador..." onkeydown="if(event.key==='Enter')addPlayer()">
    <button class="btn btn-green" onclick="addPlayer()" aria-label="Adicionar jogador">+</button>
  </div>
  <div id="player-list"><div class="empty">Adiciona os teus jogadores.</div></div>
  <div style="text-align:center;font-size:12px;color:var(--muted)" id="player-count"></div>
</div>

<!-- EQUIPAS -->
<div id="tab-setup" class="section" role="tabpanel" aria-labelledby="tab-btn-setup">
  <div class="card">
    <div class="card-title">Convocados</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <button class="btn btn-sm" onclick="selectAllPlayers()">Todos</button>
      <button class="btn btn-sm" onclick="deselectAllPlayers()">Nenhum</button>
      <span style="margin-left:auto;font-size:13px;color:var(--muted)" id="sel-count"></span>
    </div>
    <div id="selection-list"></div>
  </div>
  <div class="card">
    <div class="card-title">Excluir pares</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Jogadores que não podem ficar na mesma equipa.</p>
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <select id="e1" style="flex:1;min-width:100px"></select>
      <select id="e2" style="flex:1;min-width:100px"></select>
      <button class="btn btn-sm" onclick="addExcl()">Adicionar</button>
    </div>
    <div id="excl-list"></div>
  </div>
  <button class="sorteio-btn" onclick="makeTeams()">SORTEAR EQUIPAS</button>
  <div id="result-area" tabindex="-1" aria-label="Resultado do sorteio"></div>
  <div id="result-actions" style="display:none;gap:8px;margin-top:8px">
    <button class="redo-btn" style="flex:1" onclick="makeTeams()">↺ NOVO SORTEIO</button>
    <button class="save-draw-btn" id="save-btn" onclick="saveDrawToHistory()">Guardar</button>
  </div>
</div>

<!-- HISTÓRICO -->
<div id="tab-history" class="section" role="tabpanel" aria-labelledby="tab-btn-history">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:14px;color:var(--muted)" id="hist-count"></span>
    <button class="btn btn-sm btn-ghost" onclick="clearHistory()" style="color:var(--red)">Limpar</button>
  </div>
  <div id="hist-list"><div class="hist-empty">Ainda sem histórico de sorteios.</div></div>
</div>

</div><!-- /container -->

<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- SIGN-IN MODAL -->
<div class="modal-overlay" id="signin-modal" style="display:none" onclick="if(event.target===this)hideSignInModal()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="modal-title">Quem és?</div>
      <button style="font-size:18px;padding:4px 8px;cursor:pointer;background:none;border:none;color:var(--muted)" onclick="hideSignInModal()">✕</button>
    </div>
    <div class="modal-subtitle">Seleciona o teu nome para poderes avaliar jogadores.</div>
    <div id="signin-list"></div>
  </div>
</div>

<script>
const ATTRS = [
  { key: 'cardio',     label: 'Cardio' },
  { key: 'speed',      label: 'Velocidade' },
  { key: 'passing',    label: 'Passe' },
  { key: 'control',    label: 'Controlo' },
  { key: 'finishing',  label: 'Finalização' },
  { key: 'defending',  label: 'Defesa' },
  { key: 'intensity',  label: 'Intensidade' },
];

const WEIGHTS = {
  cardio: 0.10,
  speed: 0.15,
  passing: 0.15,
  control: 0.15,
  finishing: 0.20,
  defending: 0.20,
  intensity: 0.05,
};

function defaultAttrs(){
  const a={};
  for(const x of ATTRS) a[x.key]=3;
  return a;
}

function getPlayerAttrs(p){
  const entries=Object.values(p.ratings||{});
  if(!entries.length) return defaultAttrs();
  const avg={};
  for(const attr of ATTRS){
    avg[attr.key]=entries.reduce((s,r)=>s+(r[attr.key]||3),0)/entries.length;
  }
  return avg;
}

function getRatingCount(p){
  return Object.keys(p.ratings||{}).length;
}

function overall(p){
  const a=getPlayerAttrs(p);
  let s=0,w=0;
  for(const k in WEIGHTS){ s+=(a[k]??3)*WEIGHTS[k]; w+=WEIGHTS[k]; }
  return w?(s/w):3;
}

function migratePlayer(p){
  if(!p.ratings){
    p.ratings={};
    if(p.attrs&&Object.keys(p.attrs).length){
      p.ratings['_legacy']={...p.attrs};
    }
  }
  return p;
}

let S={
  players:[],
  exclusions:[],
  numTeams:2,
  teamNames:['Brancos','Pretos'],
  teamColors:['#ffffff','#000000'],
  selectedIds:[],
  assignments:{},
  history:[]
};

let ME=null;

let ROOM='ligadoscoxos';
const API_BASE='/api/room/';
let lastRemoteRev=0;
let remoteLoaded=false;
let saveTimer=null;

let expandedPlayerId=null;
let pendingRating=null;
let lastDraw=null;
let expandedHistoryIdx=null;

// ---- SIGN IN ----
function getMe(){
  const val=localStorage.getItem('tm2_me:'+ROOM);
  return val?parseFloat(val):null;
}

function setMe(id){

}

function updateIdentityPill(){

  if(!S.players.length){pill.style.display='none';return;}

function hideSignInModal(){

}

// ---- ROOM ----
function parseRoomFromPath(){
  const parts=location.pathname.split('/').filter(Boolean);
  const idx=parts.indexOf('grupo');
  if(idx>=0&&parts[idx+1]) return parts[idx+1];
  return 'ligadoscoxos';
}

function setRoomInPath(room){
  const clean=(room||'').trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  const r=clean||'ligadoscoxos';
  const url=`${location.origin}/grupo/${encodeURIComponent(r)}/`;
  history.replaceState(null,'',url+location.hash);
  return r;
}

async function loadRoomState(){
  ROOM=setRoomInPath(parseRoomFromPath());
  const pill=document.getElementById('room-pill');
  const status=document.getElementById('room-status');
  if(pill) pill.textContent=ROOM;
  if(status) status.textContent='a sincronizar…';
  try{
    const res=await fetch(API_BASE+encodeURIComponent(ROOM),{method:'GET'});
    if(res.ok){
      const payload=await res.json();
      lastRemoteRev=payload?.rev||0;
      if(payload&&payload.state){
        S=Object.assign(S,payload.state);
        remoteLoaded=true;
      }
      if(status) status.textContent='sincronizado';
      return;
    }
    if(status) status.textContent='local (sem servidor)';
  }catch(e){
    if(status) status.textContent='offline';
  }
}

function scheduleSaveRemote(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(saveRoomStateRemote,700);
}

async function saveRoomStateRemote(){
  const status=document.getElementById('room-status');
  try{
    const res=await fetch(API_BASE+encodeURIComponent(ROOM),{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({state:S,rev:lastRemoteRev})
    });
    if(res.ok){
      const payload=await res.json().catch(()=>null);
      if(payload&&typeof payload.rev==='number') lastRemoteRev=payload.rev;
      if(status) status.textContent='sincronizado';
    } else if(res.status===409){
      const payload=await res.json().catch(()=>null);
      if(payload&&payload.current){
        lastRemoteRev=payload.current.rev||0;
        if(status) status.textContent='conflito… a re-sincronizar';
        await fetch(API_BASE+encodeURIComponent(ROOM),{
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({state:S,rev:lastRemoteRev})
        }).then(async r=>{
          if(r.ok){
            const p=await r.json().catch(()=>null);
            if(p&&typeof p.rev==='number') lastRemoteRev=p.rev;
            if(status) status.textContent='sincronizado';
          } else {
            if(status) status.textContent='local (sem servidor)';
          }
        }).catch(()=>{if(status) status.textContent='offline';});
      } else {
        if(status) status.textContent='local (sem servidor)';
      }
    } else {
      if(status) status.textContent='local (sem servidor)';
    }
  }catch(e){
    if(status) status.textContent='offline';
  }
}

function copyRoomLink(){
  const url=`${location.origin}/grupo/${encodeURIComponent(ROOM)}/`;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>toast('Link da sala copiado!')).catch(()=>fallbackShare(url));
  } else {
    fallbackShare(url);
  }
}

// ---- STATE ----
function loadState(){
  const hash=location.hash.slice(1);
  if(hash){
    try{
      const decoded=JSON.parse(atob(hash));
      if(decoded&&decoded.players) S=Object.assign(S,decoded);
      history.replaceState(null,'',location.pathname);
    }catch(e){}
  } else if(!remoteLoaded){
    const saved=localStorage.getItem('tm2_state:'+ROOM);
    if(saved){
      try{S=Object.assign(S,JSON.parse(saved));}catch(e){}
    }
  }
  S.players=S.players.map(migratePlayer);
  if(!S.selectedIds) S.selectedIds=[];
  if(!S.assignments) S.assignments={};
  // Fix team names for existing rooms
  S.numTeams=2;
  S.teamNames=['Brancos','Pretos'];
  S.teamColors=['#ffffff','#000000'];
}

function save(){
  localStorage.setItem('tm2_state:'+ROOM,JSON.stringify(S));
  scheduleSaveRemote();
}

function shareState(){
  const encoded=btoa(JSON.stringify(S));
  const url=location.href.split('#')[0]+'#'+encoded;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>toast('Link copiado!')).catch(()=>fallbackShare(url));
  } else {
    fallbackShare(url);
  }
}

function fallbackShare(url){
  const ta=document.createElement('textarea');
  ta.value=url;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('Link copiado!');}
  catch(e){prompt('Copia este link:',url);}
  document.body.removeChild(ta);
}

function toast(msg,duration=2800){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),duration);
}

function showTab(id,el){
  document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>{x.classList.remove('active');x.setAttribute('aria-selected','false')});
  document.getElementById('tab-'+id).classList.add('active');
  el.classList.add('active');
  el.setAttribute('aria-selected','true');
  if(id==='setup')renderSetup();
  if(id==='history')renderHistory();
}

// ---- PLAYERS ----
function addPlayer(){
  const inp=document.getElementById('inp-player');
  const n=inp.value.trim();
  if(!n)return;
  S.players.push({id:Date.now()+Math.random(),name:n,ratings:{}});
  save();inp.value='';renderPlayers();
  updateIdentityPill();
}

function removePlayer(id){
  if(!isSacra()){toast('Apenas o Sacra pode remover jogadores.');return;}
  S.players=S.players.filter(x=>x.id!==id);
  S.exclusions=S.exclusions.filter(e=>e[0]!==id&&e[1]!==id);
  S.selectedIds=(S.selectedIds||[]).filter(x=>x!==id);
  if(S.assignments) delete S.assignments[id];
  if(ME===id){
    ME=null;
    localStorage.removeItem('tm2_me:'+ROOM);
  }
  save();renderPlayers();
  updateIdentityPill();
}

function togglePlayer(id){
  if(expandedPlayerId===id){
    expandedPlayerId=null;
    pendingRating=null;
  } else {
    expandedPlayerId=id;
    if(ME&&ME!==id){
      const p=S.players.find(x=>x.id===id);
      if(p){
        const existing=(p.ratings||{})[String(ME)];
        pendingRating=existing?{...existing}:{};
      }
    } else {
      pendingRating=null;
    }
  }
  renderPlayers();
}

function setPendingAttr(key,val){
  if(!pendingRating) return;
  pendingRating[key]=val;
  renderPlayers();
}

function pendingStarKey(e,key,val){
  if(e.key==='ArrowRight'||e.key==='ArrowUp'){e.preventDefault();setPendingAttr(key,Math.min(5,val+1));}
  else if(e.key==='ArrowLeft'||e.key==='ArrowDown'){e.preventDefault();setPendingAttr(key,Math.max(1,val-1));}
}

function submitRating(playerId){
  if(!ME||!pendingRating) return;
  const allFilled=ATTRS.every(a=>pendingRating[a.key]>=1&&pendingRating[a.key]<=5);
  if(!allFilled){toast('Avalia todos os atributos antes de submeter.');return;}
  const p=S.players.find(x=>x.id===playerId);
  if(!p) return;
  if(!p.ratings) p.ratings={};
  p.ratings[String(ME)]={...pendingRating};
  pendingRating=null;
  save();renderPlayers();
  toast('Avaliação submetida!');
}

function miniStars(val){
  const full=Math.round(val);
  let s='';
  for(let i=1;i<=5;i++) s+=i<=full?'★':'<span class="empty">★</span>';
  return s;
}

function readOnlyStars(val){
  const rounded=Math.round(val);
  let s='';
  for(let i=1;i<=5;i++) s+=`<span style="font-size:16px;color:${i<=rounded?'var(--gold)':'var(--border)'}">★</span>`;
  return s;
}

function renderPlayers(){
  const el=document.getElementById('player-list');
  if(!S.players.length){el.innerHTML='<div class="empty">Adiciona os teus jogadores.</div>';document.getElementById('player-count').textContent='';return;}
  el.innerHTML=sortedPlayers().map(p=>{
    const avgAttrs=getPlayerAttrs(p);
    const ov=overall(p);
    const rc=getRatingCount(p);
    const isOpen=p.id===expandedPlayerId;
    const canRate=ME&&ME!==p.id;
    const hasRated=ME&&p.ratings&&p.ratings[String(ME)];

    let avgSection=`<div class="rating-count">${rc} ${rc===1?'avaliação':'avaliações'}</div>`;
    avgSection+=`<div class="attr-grid">`;
    for(const attr of ATTRS){
      const val=avgAttrs[attr.key];
      avgSection+=`
        <div class="attr-label">${attr.label}</div>
        <div style="display:flex;align-items:center;gap:6px">
          ${readOnlyStars(val)}
          <span class="avg-val">${val.toFixed(1)}</span>
        </div>`;
    }
    avgSection+=`</div>`;

    let ratingForm='';
    if(canRate&&isOpen){
      const pr=pendingRating||{};
      ratingForm=`<div class="rating-section-title">${hasRated?'Alterar avaliação':'A tua avaliação'}</div>`;
      ratingForm+=`<div class="attr-grid">`;
      for(const attr of ATTRS){
        const val=pr[attr.key]||0;
        ratingForm+=`
          <div class="attr-label" id="rate-${p.id}-${attr.key}">${attr.label}</div>
          <div class="stars" role="radiogroup" aria-labelledby="rate-${p.id}-${attr.key}">
            ${[1,2,3,4,5].map(s=>`<button type="button" class="star ${val>=s?'lit':''}" role="radio" aria-checked="${val===s}" aria-label="${s} de 5" tabindex="${val===s?'0':'-1'}" onclick="setPendingAttr('${attr.key}',${s})" onkeydown="pendingStarKey(event,'${attr.key}',${s})">★</button>`).join('')}
          </div>`;
      }
      ratingForm+=`</div>`;
      const allFilled=ATTRS.every(a=>pr[a.key]>=1&&pr[a.key]<=5);
      ratingForm+=`<button class="submit-rating-btn" onclick="submitRating(${p.id})" ${allFilled?'':'disabled'}>${hasRated?'Atualizar avaliação':'Submeter avaliação'}</button>`;
    } else if(!ME&&isOpen){
      ratingForm=`<div style="font-size:13px;color:var(--muted);margin-top:12px;padding-top:10px;border-top:1px solid var(--border);text-align:center">
        <button class="btn btn-sm btn-green" onclick="showSignInModal()">Identifica-te</button> para avaliar jogadores
      </div>`;
    } else if(ME&&ME===p.id&&isOpen){
      ratingForm=`<div style="font-size:13px;color:var(--muted);margin-top:12px;padding-top:10px;border-top:1px solid var(--border);text-align:center">Não podes avaliar-te a ti mesmo.</div>`;
    }

    return `
    <div class="player-item ${isOpen?'open':''}">
      <div class="player-header" role="button" tabindex="0" aria-expanded="${isOpen}" onclick="togglePlayer(${p.id})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();togglePlayer(${p.id})}">
        <span class="player-name-text">${esc(p.name)}</span>
        <span class="player-avg">${ov.toFixed(1)}</span>
        <span class="mini-stars" aria-hidden="true">${miniStars(ov)}</span>
        <span class="player-chev" aria-hidden="true">▾</span>
        <button class="remove-btn" aria-label="Remover ${esc(p.name)}" onclick="event.stopPropagation();removePlayer(${p.id})">✕</button>
      </div>
      <div class="player-body">
        ${avgSection}
        ${ratingForm}
      </div>
    </div>`;
  }).join('');
  document.getElementById('player-count').textContent=`${S.players.length} jogadores registados`;
}

  }).join('');

// ---- MAKE TEAMS ----
function makeTeams(){
  const selected=S.players.filter(p=>(S.selectedIds||[]).includes(p.id));
  if(selected.length<2){toast('Precisas de pelo menos 2 jogadores convocados!');return;}

  const assignments=S.assignments||{};
  const preB=selected.filter(p=>assignments[p.id]==='brancos');
  const preP=selected.filter(p=>assignments[p.id]==='pretos');
  const auto=selected.filter(p=>!assignments[p.id]);

  let best=null,bestScore=Infinity;

  for(let t=0;t<500;t++){
    let pool=[...auto].sort(()=>Math.random()-.5);
    pool.sort((a,b)=>overall(b)-overall(a));

    let teams=[
      {name:'Brancos',color:'#ffffff',players:[...preB]},
      {name:'Pretos',color:'#000000',players:[...preP]}
    ];

    // Greedy: assign each auto player to the team with lower total rating
    pool.forEach(p=>{
      const s0=teams[0].players.reduce((s,x)=>s+overall(x),0);
      const s1=teams[1].players.reduce((s,x)=>s+overall(x),0);
      teams[s0<=s1?0:1].players.push(p);
    });

    if(checkExcl(teams)){
      const sums=teams.map(t=>t.players.reduce((s,x)=>s+overall(x),0));
      const score=Math.abs(sums[0]-sums[1]);
      if(score<bestScore){bestScore=score;best=teams;}
      if(bestScore===0)break;
    }
  }

  if(!best){
    let pool=[...auto].sort(()=>Math.random()-.5);
    best=[
      {name:'Brancos',color:'#ffffff',players:[...preB]},
      {name:'Pretos',color:'#000000',players:[...preP]}
    ];
    pool.forEach((p,i)=>best[i%2].players.push(p));
    toast('Não foi possível respeitar todas as exclusões.');
  }

  lastDraw=best;
  renderResult(best);
  const actions=document.getElementById('result-actions');
  actions.style.display='flex';
  const saveBtn=document.getElementById('save-btn');
  saveBtn.disabled=false;
  saveBtn.textContent='Guardar';
  document.getElementById('result-area').focus();
}

function saveDrawToHistory(){
  if(!lastDraw) return;
  const record={
    id:Date.now(),
    date:new Date().toLocaleString('pt-PT'),
    score:[0,0],
    teams:lastDraw.map(t=>({
      name:t.name,
      color:t.color,
      players:t.players.map(p=>({name:p.name,goals:0,assists:0}))
    }))
  };
  S.history.unshift(record);
  if(S.history.length>50)S.history=S.history.slice(0,50);
  lastDraw=null;
  save();saveRoomStateRemote();
  const saveBtn=document.getElementById('save-btn');
  saveBtn.disabled=true;
  saveBtn.textContent='Guardado!';
  toast('Sorteio guardado no histórico!');
}

function checkExcl(teams){
  return !S.exclusions.some(([a,b])=>teams.some(t=>{
    const ids=t.players.map(p=>p.id);return ids.includes(a)&&ids.includes(b);
  }));
}

function renderResult(teams){
  const t0=teams[0],t1=teams[1];
  const avg0=t0.players.length?(t0.players.reduce((s,p)=>s+overall(p),0)/t0.players.length):0;
  const avg1=t1.players.length?(t1.players.reduce((s,p)=>s+overall(p),0)/t1.players.length):0;
  document.getElementById('result-area').innerHTML=`
    <div class="result-columns">
      <div class="result-col">
        <div class="result-col-title">⚪ ${esc(t0.name)}</div>
        ${t0.players.map(p=>`
          <div class="result-player">
            <span class="result-player-name">${esc(p.name)}</span>
            <span class="result-player-rating">${overall(p).toFixed(1)}</span>
          </div>`).join('')}
        <div class="result-col-avg">Avg ${avg0.toFixed(1)}</div>
      </div>
      <div class="result-col">
        <div class="result-col-title">⚫ ${esc(t1.name)}</div>
        ${t1.players.map(p=>`
          <div class="result-player">
            <span class="result-player-name">${esc(p.name)}</span>
            <span class="result-player-rating">${overall(p).toFixed(1)}</span>
          </div>`).join('')}
        <div class="result-col-avg">Avg ${avg1.toFixed(1)}</div>
      </div>
    </div>`;
}

// ---- HISTORY ----
function toggleHistoryItem(idx){
  expandedHistoryIdx=expandedHistoryIdx===idx?null:idx;
  renderHistory();
}

function getScore(rec){
  if(rec.score) return rec.score;
  // Legacy: compute from goals
  if(rec.teams&&rec.teams.length>=2){
    return rec.teams.map(t=>(t.players||[]).reduce((s,p)=>s+(p.goals||0),0));
  }
  return [0,0];
}

function histScoreSummary(rec){
  if(!rec.teams||rec.teams.length<2) return '';
  const s=getScore(rec);
  return `${s[0]} - ${s[1]}`;
}

function updateScore(histIdx,teamIdx,delta){
  const rec=S.history[histIdx];
  if(!rec) return;
  if(!rec.score) rec.score=getScore(rec);
  rec.score[teamIdx]=Math.max(0,rec.score[teamIdx]+delta);
  // Cap player goals/assists to not exceed new team score
  capTeamStats(rec,teamIdx);
  save();renderHistory();
}

function capTeamStats(rec,teamIdx){
  const team=rec.teams[teamIdx];
  if(!team) return;
  const maxGoals=rec.score[teamIdx];
  const maxAssists=rec.score[teamIdx];
  let totalGoals=(team.players||[]).reduce((s,p)=>s+(p.goals||0),0);
  // If total goals exceed score, trim from the end
  if(totalGoals>maxGoals){
    for(let i=team.players.length-1;i>=0&&totalGoals>maxGoals;i--){
      const excess=totalGoals-maxGoals;
      const reduce=Math.min(team.players[i].goals||0,excess);
      team.players[i].goals=(team.players[i].goals||0)-reduce;
      totalGoals-=reduce;
    }
  }
  let totalAssists=(team.players||[]).reduce((s,p)=>s+(p.assists||0),0);
  if(totalAssists>maxAssists){
    for(let i=team.players.length-1;i>=0&&totalAssists>maxAssists;i--){
      const excess=totalAssists-maxAssists;
      const reduce=Math.min(team.players[i].assists||0,excess);
      team.players[i].assists=(team.players[i].assists||0)-reduce;
      totalAssists-=reduce;
    }
  }
}

function updatePlayerStat(histIdx,teamIdx,playerIdx,stat,delta){
  const rec=S.history[histIdx];
  if(!rec) return;
  if(!rec.score) rec.score=getScore(rec);
  const team=rec.teams[teamIdx];
  const p=team.players[playerIdx];
  if(!p) return;
  const newVal=Math.max(0,(p[stat]||0)+delta);
  // Check cap: total for this stat on this team can't exceed team score
  const teamTotal=(team.players||[]).reduce((s,x)=>s+(x[stat]||0),0)-((p[stat]||0))+newVal;
  if(teamTotal>rec.score[teamIdx]) return;
  p[stat]=newVal;
  save();renderHistory();
}

function deleteHistoryItem(idx){
  if(!isSacra()){toast('Apenas o Sacra pode apagar sorteios.');return;}
  S.history.splice(idx,1);
  expandedHistoryIdx=null;
  save();saveRoomStateRemote();renderHistory();
}

function renderMatchDetail(rec,ri){
  const teams=rec.teams||[];
  if(teams.length<2) return '';
  const t0=teams[0],t1=teams[1];
  const sc=getScore(rec);
  let html=`
    <div class="match-score">
      <div class="match-score-team">
        <div class="match-score-dot" style="background:${t0.color};border:1px solid var(--border)"></div>
        <span class="match-score-name">${esc(t0.name)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="stat-btn" onclick="updateScore(${ri},0,-1)">−</button>
        <span class="match-score-num">${sc[0]}</span>
        <button class="stat-btn" onclick="updateScore(${ri},0,1)">+</button>
      </div>
      <span class="match-score-vs">-</span>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="stat-btn" onclick="updateScore(${ri},1,-1)">−</button>
        <span class="match-score-num">${sc[1]}</span>
        <button class="stat-btn" onclick="updateScore(${ri},1,1)">+</button>
      </div>
      <div class="match-score-team">
        <span class="match-score-name">${esc(t1.name)}</span>
        <div class="match-score-dot" style="background:${t1.color};border:1px solid var(--border)"></div>
      </div>
    </div>
    <div class="match-columns">`;
  for(let ti=0;ti<2;ti++){
    const team=teams[ti];
    html+=`<div class="match-col">
      <div class="match-col-title">${esc(team.name)}</div>`;
    html+=(team.players||[]).map((p,pi)=>`
      <div class="match-player">
        <div class="match-player-name">${esc(p.name)}</div>
        <div class="match-player-stats">
          <div class="stat-ctrl">
            <span class="stat-label">G</span>
            <button class="stat-btn" onclick="updatePlayerStat(${ri},${ti},${pi},'goals',-1)">−</button>
            <span class="stat-val">${p.goals||0}</span>
            <button class="stat-btn" onclick="updatePlayerStat(${ri},${ti},${pi},'goals',1)">+</button>
          </div>
          <div class="stat-ctrl">
            <span class="stat-label">A</span>
            <button class="stat-btn" onclick="updatePlayerStat(${ri},${ti},${pi},'assists',-1)">−</button>
            <span class="stat-val">${p.assists||0}</span>
            <button class="stat-btn" onclick="updatePlayerStat(${ri},${ti},${pi},'assists',1)">+</button>
          </div>
        </div>
      </div>`).join('');
    html+=`</div>`;
  }
  html+=`</div>`;
  html+=`<button class="btn btn-sm btn-red" style="margin-top:12px;width:100%" onclick="deleteHistoryItem(${ri})">Apagar sorteio</button>`;
  return html;
}

function renderHistory(){
  const el=document.getElementById('hist-list');
  document.getElementById('hist-count').textContent=S.history.length?`${S.history.length} sorteios guardados`:'';
  if(!S.history.length){el.innerHTML='<div class="hist-empty">Ainda sem histórico de sorteios.</div>';return;}
  el.innerHTML=S.history.map((rec,ri)=>{
    const isOpen=expandedHistoryIdx===ri;
    const scoreTxt=histScoreSummary(rec);
    const dots=(rec.teams||[]).map(t=>`<div style="width:10px;height:10px;border-radius:50%;background:${t.color};border:1px solid var(--border);flex-shrink:0"></div>`).join('');
    const teamNames=(rec.teams||[]).map(t=>esc(t.name)).join(' vs ');
    return `
      <div class="hist-item ${isOpen?'open':''}">
        <div class="hist-header" onclick="toggleHistoryItem(${ri})">
          <div style="display:flex;gap:4px;align-items:center">${dots}</div>
          <div style="min-width:0;flex:1">
            <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${teamNames}</div>
            <div class="hist-date">${rec.date}</div>
          </div>
          <span class="hist-score-pill">${scoreTxt}</span>
          <span class="hist-chev">▾</span>
        </div>
        <div class="hist-body">
          ${isOpen?renderMatchDetail(rec,ri):''}
        </div>
      </div>`;
  }).join('');
}

function isSacra(){
  if(!ME) return false;
  const p=S.players.find(x=>x.id===ME);
  return p&&p.name.toLowerCase().includes('sacra');
}

function clearHistory(){
  if(!isSacra()){toast('Apenas o Sacra pode apagar o histórico.');return;}
  if(!confirm('Apagar todo o histórico?'))return;
  S.history=[];expandedHistoryIdx=null;save();saveRoomStateRemote();renderHistory();
}

// ---- UTILS ----
function esc(s){if(!s)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function sortedPlayers(){return[...S.players].sort((a,b)=>a.name.localeCompare(b.name,'pt'));}

// ---- GROUPS ----
function getMyGroups(){
  try{return JSON.parse(localStorage.getItem('tm2_groups')||'[]');}catch(e){return[];}
}
function saveMyGroups(groups){
  localStorage.setItem('tm2_groups',JSON.stringify(groups));
}

function toggleGroupsPanel(){
  const panel=document.getElementById('groups-panel');
  panel.classList.toggle('open');
  if(panel.classList.contains('open'))renderGroupList();
}

function renderGroupList(){
  const groups=getMyGroups();
  if(!groups.includes(ROOM)){groups.push(ROOM);saveMyGroups(groups);}
  const el=document.getElementById('group-list');
  if(!groups.length){el.innerHTML='<div style="font-size:13px;color:var(--muted);padding:4px 0">Nenhum grupo.</div>';return;}
  el.innerHTML=groups.map(g=>`
    <div class="group-list-item ${g===ROOM?'active':''}" role="button" tabindex="0" onclick="switchGroup('${esc(g)}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();switchGroup('${esc(g)}')}">
      <span class="dot"></span>
      <span>${esc(g)}</span>
      ${g!==ROOM?`<button class="del-group" aria-label="Remover grupo ${esc(g)}" onclick="event.stopPropagation();removeGroup('${esc(g)}')">✕</button>`:''}
    </div>`).join('');
}

function createGroup(){
  const inp=document.getElementById('inp-new-group');
  const raw=inp.value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  if(!raw){toast('Escolhe um nome válido.');return;}
  const groups=getMyGroups();
  if(!groups.includes(raw))groups.push(raw);
  saveMyGroups(groups);
  inp.value='';
  switchGroup(raw);
}

function removeGroup(name){
  let groups=getMyGroups().filter(g=>g!==name);
  saveMyGroups(groups);
  localStorage.removeItem('tm2_state:'+name);
  renderGroupList();
}

async function switchGroup(name){
  save();
  S={players:[],exclusions:[],numTeams:2,teamNames:['Brancos','Pretos'],teamColors:['#ffffff','#000000'],selectedIds:[],assignments:{},history:[]};
  lastRemoteRev=0;
  remoteLoaded=false;
  lastDraw=null;
  ROOM=setRoomInPath(name);
  await loadRoomState();
  loadState();
  ME=getMe();
  if(ME&&!S.players.find(p=>p.id===ME)){
    ME=null;
    localStorage.removeItem('tm2_me:'+ROOM);
  }
  updateIdentityPill();
  renderPlayers();
  document.getElementById('groups-panel').classList.remove('open');
}

// ---- INIT ----
async function init(){
  await loadRoomState();
  loadState();
  const groups=getMyGroups();
  if(!groups.includes(ROOM)){groups.push(ROOM);saveMyGroups(groups);}

  ME=getMe();
  if(ME&&!S.players.find(p=>p.id===ME)){
    ME=null;
    localStorage.removeItem('tm2_me:'+ROOM);
  }

  renderPlayers();
  updateIdentityPill();

  if(!ME&&S.players.length>0){
    showSignInModal();
  }
}
init();
</script>
